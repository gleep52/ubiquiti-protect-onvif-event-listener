# Google C++ Style Guide — cpplint configuration
# https://google.github.io/styleguide/cppguide.html

# cpplint version header length limit (Google default is 80, we allow 100)
linelength=80

# Filters: suppress categories that conflict with our deliberate choices.
#   -build/include_subdir  : headers are in the same directory (no subdir prefix needed)
#   -legal/copyright       : no file-level copyright blocks required
#   -build/c++11           : we intentionally use C++17
filter=-build/include_subdir,-legal/copyright,-build/c++11
